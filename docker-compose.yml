version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jpvano_postgres
    environment:
      POSTGRES_DB: jpvano_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./jpvano-backend
      dockerfile: Dockerfile
    container_name: jpvano_backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jpvano_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      NODE_ENV: development
      JWT_SECRET: your_secret_key_change_this
      JWT_REFRESH_SECRET: your_refresh_secret_change_this
      SERVER_PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./jpvano-backend/src:/app/src
      - ./jpvano-backend/uploads:/app/uploads
    command: npm run dev

  frontend:
    build:
      context: ./jpvano-frontend
      dockerfile: Dockerfile
    container_name: jpvano_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_WS_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./jpvano-frontend/src:/app/src

  nginx:
    image: nginx:alpine
    container_name: jpvano_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:

networks:
  default:
    name: jpvano_network
